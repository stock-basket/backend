spring:
  application:
    name: stockbasket

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate.ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

jwt:
  secret: ${JWT_SECRET}
  access-token-validity-ms: ${JWT_ACCESS_TOKEN_VALIDITY_MS}

openai:
  api-key: ${OPENAI_API_KEY}
  model: ${OPENAI_MODEL}

claude:
  api-key: ${CLAUDE_API_KEY}
  model: ${CLAUDE_MODEL}

llm:
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.0-flash}
  nvidia:
    api-key: ${NVIDIA_API_KEY:}
    model: ${NVIDIA_MODEL:meta/llama-3.1-405b-instruct}
    base-url: https://integrate.api.nvidia.com/v1
  enabled:
    claude: ${LLM_CLAUDE_ENABLED:true}
    openai: ${LLM_OPENAI_ENABLED:true}
    gemini: ${LLM_GEMINI_ENABLED:true}
    nvidia: ${LLM_NVIDIA_ENABLED:true}

naver:
  search:
    client-id: ${NAVER_SEARCH_CLIENT_ID}
    client-secret: ${NAVER_SEARCH_CLIENT_SECRET}
    url-filter:
      enabled: ${NAVER_URL_FILTER_ENABLED:true}
      allowed-patterns:
        - "https://n.news.naver.com"

kiwoom:
  token-url: ${KIWOOM_TOKEN_URL:https://api.kiwoom.com/oauth2/token}
  ws-url: ${KIWOOM_WS_URL:wss://api.kiwoom.com:10000/api/dostk/websocket}
  appkey: ${KIWOOM_APPKEY}
  secretkey: ${KIWOOM_SECRETKEY}
