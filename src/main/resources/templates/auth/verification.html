<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>이메일 인증</title>
    <style>
        body { margin: 0; padding: 0; background-color: #f4f4f4; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; }
        .wrapper { max-width: 520px; margin: 40px auto; background-color: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .header { background-color: #1a1a2e; padding: 32px 40px; text-align: center; }
        .header h1 { margin: 0; color: #ffffff; font-size: 22px; letter-spacing: 1px; }
        .body { padding: 40px; color: #333333; }
        .body p { margin: 0 0 16px; font-size: 15px; line-height: 1.6; }
        .code-box { margin: 28px 0; background-color: #f0f4ff; border-radius: 8px; padding: 20px; text-align: center; }
        .code-box span { font-size: 38px; font-weight: bold; letter-spacing: 12px; color: #1a1a2e; }
        .ttl { font-size: 13px; color: #888888; margin-top: 8px; }
        .footer { background-color: #f9f9f9; padding: 20px 40px; text-align: center; font-size: 12px; color: #aaaaaa; border-top: 1px solid #eeeeee; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="header">
        <h1>StockBasket</h1>
    </div>
    <div class="body">
        <p>안녕하세요,</p>
        <p>StockBasket 회원가입을 위한 이메일 인증 코드입니다.<br/>아래 코드를 입력창에 입력해 주세요.</p>
        <div class="code-box">
            <span th:text="${code}">000000</span>
            <div class="ttl" th:text="${expireMinutes} + '분 이내에 입력해 주세요.'">5분 이내에 입력해 주세요.</div>
        </div>
        <p>본인이 요청하지 않은 경우 이 메일을 무시하셔도 됩니다.</p>
    </div>
    <div class="footer">
        &copy; 2026 StockBasket. All rights reserved.
    </div>
</div>
</body>
</html>
